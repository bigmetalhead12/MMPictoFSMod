# Config file for an example Majora's Mask: Recompiled mod.

# Fields that end up in the mod's manifest.
[manifest]

# Unique ID of this mod. Pick something long enough that it'll never be the same as any other mod.
# The name displayed in the mod management menu is separate from this so this doesn't need to be human readable.
id = "mm_picto_export"

# Version of this mod.
version = "1.2.5"

# The name that will show up for this mod in the mod menu. This should be human readable.
display_name = "Pictobox PNG Export Mod"

# The description that will show up when this mod is displayed in the mod menu. This should be human readable.
description =  """
Save pictobox photo as a PNG file to local filesystem directory.

Choose how to save your pictobox photo through the configuration option.

To find your saved photo, follow the directions:
1. In MM Recomp's Mod menu, click 'Open Mods Folder'
2. Go to the parent directory
3. Go to the 'mod_data' directory
4. Go to the 'MM_PictoPhotos' directory
"""

# A short description that will show up in this mod's entry in the mod list. This should be human readable and kept short
# to prevent it from being cut off due to the limited space.
short_description = "Save pictobox photo as a PNG file to local filesystem directory."

# Authors of this mod.
authors = [ "Bigmetalhead12" ]

# ID of the target recomp game.
game_id = "mm"

# Minimum version of the target recomp (e.g. Zelda 64: Recompiled) that this mod can run on.
minimum_recomp_version = "1.2.2"

# Dependency mods. Each entry is the mod's ID and then an optional minimum version of the dependency mod.
dependencies = [
	"RecompExternalPython_API:2.0.0"
]

# Optional dependency mods. This has the same format as `dependencies`, but the game will still start if dependencies in this
# list aren't present. You can query the presence of a given dependency by using `recomp_is_dependency_met` in recomputils.h.
# Calling a function imported from an optional dependency that isn't present will trigger an error.
optional_dependencies = [

]

# Native libraries (e.g. DLLs) and the functions they export.
native_libraries = [
# Example native library:
#    { name = "my_native_library", funcs = ["my_native_library_function"] }
]

# Inputs to the mod tool.
[inputs]

# Input elf file to generate a mod from.
elf_path = "build/mod.elf"

# Output mod filename.
mod_filename = "mm_picto_save"

# Reference symbol files.
func_reference_syms_file = "Zelda64RecompSyms/mm.us.rev1.syms.toml"
data_reference_syms_files = [ "Zelda64RecompSyms/mm.us.rev1.datasyms.toml", "Zelda64RecompSyms/mm.us.rev1.datasyms_static.toml" ]

# Additional files to include in the mod.
additional_files = [ 
	"thumb.png",
	"src/picto_png.py",
	"src/picto_export.py"
]

[[manifest.config_options]]
id = "display_mode"
name = "In-Game Display Mode"
description = """
Toggle to change how the pictobox's photo is displayed in-game (Original or Color).

When "Original" is enabled, photos are shown as their original grayscale version in the game.

When "Color" is enabled, photos are shown in color in the game.
"""
type = "Enum"
options = [ "Original", "Color" ]
default = "Original"

[[manifest.config_options]]
id = "export_mode"
name = "Export Mode"
description = """
Toggle to change when to save pictobox's photo (Automatic or Selective).

When "Automatic" is enabled, any photo taken, whether it is saved or not in-game, will be exported to the filesystem directory.

When "Selective" is enabled, only photos saved in-game will be exported to the filesystem directory.
"""
type = "Enum"
options = [ "Automatic", "Selective" ]
default = "Automatic"

[[manifest.config_options]]
id = "export_type"
name = "Photo Save Type"
description = """
Toggle to change how the pictobox's photo is exported (Original or Color).

When "Original" is enabled, photos are exported as their original grayscale/low-res version as seen in game.

When "Color" is enabled, photos are exported in color at the N64's original resolution.

When "Both" is enabled, photos are exported both in their original form and in the higher resolution colored form.
"""
type = "Enum"
options = [ "Original", "Color", "Both" ]
default = "Original"